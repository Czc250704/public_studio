<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论坛</title>
    <link rel="stylesheet" href="askall.css">
    <!-- 【修复】暗色样式文件必须与亮色样式同目录，不能加多余路径 -->
    <link rel="stylesheet" href="baskall.css">
    <script src="askall.js" defer></script>
</head>
<body>
    <div class="fixed-header-container">
        <div class="top-header"><div class="header-title">论坛</div></div>
        <div class="nav-bar">
            <div class="nav-links">
                <a href="#">论坛简介</a>
                <a href="#">复制链接</a>
                <a href="#" id="toggle-theme-btn">夜间模式</a>
                <a href="../../../index.html">返回主页</a>
            </div>
            <div class="nav-tools">
                <label for="search-input">搜索帖子</label>
                <input type="text" id="search-input" placeholder="输入帖子标题...">
                <span id="current-time">时间</span>
            </div>
        </div>
    </div>

    <div class="forum-container">
        <div class="main-posts-column">
            <div class="column-header">
                <div>
                    <h2>最新讨论</h2>
                    <span id="post-count" style="color:#999;font-size:13px;margin-top:4px;display:block;"></span>
                </div>
                <button class="new-post-btn" id="open-post-modal-btn">+ 发布新帖</button>
            </div>
            <div class="post-list" id="post-list-container">
                <!-- 由 JS 动态生成 -->
            </div>
        </div>

        <div class="sidebar-column">
            <div class="sidebar-card">
                <h3>公告栏</h3>
                <p style="color: #666; font-size: 14px; margin-top: 10px; line-height: 1.6;">欢迎来到 Public Studio 论坛。请遵守社区规则，友善交流。</p>
            </div>
            <div class="sidebar-card" style="margin-top: 20px;">
                <h3>热门讨论</h3>
                <ul class="hot-topic-list">
                    <li><a href="#">关于 PDF 阅读器的开发讨论</a></li>
                    <li><a href="#">JavaScript 高级程序设计读后感</a></li>
                    <li><a href="#">液态玻璃 UI 效果实现分享</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 新增：发帖模态框 -->
    <div id="post-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content glass-effect">
            <div class="modal-header">
                <h3>发布新帖</h3>
                <span class="close-modal-btn">&times;</span>
            </div>
            <div class="modal-body">
                <input type="text" id="post-title-input" placeholder="帖子标题" style="width:100%;padding:10px;border:1px solid var(--border-color);border-radius:6px;margin-bottom:15px;">
                <textarea id="post-content-input" placeholder="帖子内容（支持文字与排版）" rows="6" style="width:100%;padding:10px;border:1px solid var(--border-color);border-radius:6px;resize:none;"></textarea>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn">取消</button>
                <button class="submit-btn" id="submit-post-btn">确认发布</button>
            </div>
        </div>
    </div>
</body>
</html>

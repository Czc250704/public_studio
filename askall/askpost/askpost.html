<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论坛 - 帖子详情</title>
    <link rel="stylesheet" href="../askall.css">
    <!-- 同样必须导入正确的同级 CSS -->
    <link rel="stylesheet" href="../baskall.css">
    <script src="askpost.js" defer></script>
</head>
<body>
    <div class="fixed-header-container">
        <div class="top-header"><div class="header-title">论坛</div></div>
        <div class="nav-bar">
            <div class="nav-links">
                <a href="../askall.html">返回列表</a>
                <a href="#">回复帖子</a>
                <a href="#" id="toggle-theme-btn">夜间模式</a>
            </div>
            <div class="nav-tools">
                <span id="current-time">时间</span>
            </div>
        </div>
    </div>

    <div class="forum-container" style="flex-direction: column; max-width: 800px;">
        <div class="post-detail-header">
            <h1 id="detail-title" style="color:var(--secondary-text);">正在加载...</h1>
            <div class="post-meta" style="margin-top: 10px; color: #999; font-size: 13px;">
                作者：<span id="detail-author"></span> &nbsp;|&nbsp; 发布时间：<span id="detail-time"></span>
            </div>
        </div>

        <div class="post-content" style="background: var(--card-bg); border-radius: 12px; padding: 30px; margin-top: 20px; line-height: 1.8; color: #444; min-height: 150px;">
            <p id="detail-content">正在加载正文...</p>
        </div>

        <div class="comment-section" style="margin-top: 40px; border-top: 2px solid var(--border-color); padding-top: 20px;">
            <h3 style="color: #666;">全部评论 (<span id="comment-count">0</span>)</h3>
            
            <!-- 新增评论提交表单 -->
            <div class="comment-form" style="margin-top:15px; margin-bottom:20px;">
                <input type="text" id="comment-nickname" placeholder="您的昵称" style="width: 30%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; outline:none; margin-bottom: 10px; background: transparent; color: var(--secondary-text);">
                <textarea id="comment-input" placeholder="写下你的评论..." rows="2" style="width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; resize: vertical; outline:none; background: transparent; color: var(--secondary-text);"></textarea>
                <button id="submit-comment-btn" style="background:var(--header-bg); color:#fff; border:none; padding:8px 20px; border-radius:6px; margin-top:10px; cursor:pointer;">发表评论</button>
            </div>

            <div id="comment-list-container">
                <!-- 由 JS 动态渲染 -->
            </div>
        </div>
    </div>
</body>
</html>

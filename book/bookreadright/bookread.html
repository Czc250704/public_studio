<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书库 - 阅读</title>
    <!-- 引入亮色和暗色两套样式表 -->
    <link rel="stylesheet" href="bookread.css">
    <link rel="stylesheet" href="../bookreadblack/bbookread.css"> 
    <script src="bookread.js" defer></script>
</head>
<body>
    <!-- 同样包裹在固定容器中 -->
    <div class="fixed-header-container">
        <div class="top-header">
            <div class="header-title">书库</div>
        </div>
        <div class="nav-bar">
            <div class="nav-links">
                <a href="#">书本简介</a>
                <a href="#">复制</a>
                <a href="#">复制书本链接</a>
                <a href="#" id="toggle-theme-btn">夜间模式</a>
                <div class="dropdown">
                    <a href="#" class="dropdown-trigger">属性</a>
                    <div class="dropdown-menu">
                        <a href="#">字体设置</a>
                        <a href="#">行距设置</a>
                        <a href="#">书签管理</a>
                    </div>
                </div>
                <a href="#">下载</a>
                <a href="../../../index.html" onclick="return confirm('确认返回书库主页吗？');">返回</a>
            </div>
            <div class="nav-tools">
                <label for="chapter-select">搜索章节</label>
                <select id="chapter-select">
                    <option value="0">第一章：起源</option>
                    <option value="1">第二章：探索</option>
                    <option value="2">第三章：深入</option>
                    <option value="3">第四章：突破</option>
                </select>
                <span id="current-time">时间</span>
                <span id="current-page" style="margin-left: 20px; font-size: 14px; color: var(--header-bg);">当前页码：1/345</span>
            </div>
        </div>
    </div>

    <!-- 阅读区三栏布局 -->
    <div class="reading-container">
        <!-- 左侧：目录面板 -->
        <div class="left-panel">
            <div class="panel-header">目录 快速跳转</div>
            <ul class="chapter-list">
                <li data-page="1">第一章：起源与背景故事</li>
                <li data-page="15">第二章：踏上未知的旅途</li>
                <li data-page="32">第三章：困难与挑战降临</li>
                <li data-page="48">第四章：隐藏的真相</li>
                <li data-page="67">第五章：峰回路转的时刻</li>
            </ul>
        </div>

        <!-- 中间：阅读正文区域 - 嵌入 PDF 阅读器 -->
        <div class="center-panel">
            <!-- 使用 iframe 嵌入 pdf 文件，浏览器原生支持阅读，不需要额外插件 -->
            <iframe id="pdf-viewer" src="" width="100%" height="100%" style="border: none; display: block;"></iframe>
        </div>
    </div>
</body>
</html>
